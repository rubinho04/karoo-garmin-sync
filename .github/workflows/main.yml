name: Karoo to Garmin Sync

on:
  schedule:
    # Läuft alle 30 Minuten vollautomatisch
    - cron: '*/30 * * * *'
  # Erlaubt das manuelle Starten über den Button "Run workflow"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect requests garth PyJWT
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create karoosync.cfg
        env:
          HAMMERHEAD_EMAIL: ${{ secrets.HAMMERHEAD_EMAIL }}
          HAMMERHEAD_PASSWORD: ${{ secrets.HAMMERHEAD_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python -c "import configparser, os
          config = configparser.ConfigParser()
          
          config['karoo'] = {'username': os.environ['HAMMERHEAD_EMAIL'], 'password': os.environ['HAMMERHEAD_PASSWORD'], 'email': os.environ['HAMMERHEAD_EMAIL']}
          config['Karoo'] = {'username': os.environ['HAMMERHEAD_EMAIL'], 'password': os.environ['HAMMERHEAD_PASSWORD'], 'email': os.environ['HAMMERHEAD_EMAIL']}
          config['hammerhead'] = {'username': os.environ['HAMMERHEAD_EMAIL'], 'password': os.environ['HAMMERHEAD_PASSWORD'], 'email': os.environ['HAMMERHEAD_EMAIL']}
          config['garmin'] = {'username': os.environ['GARMIN_EMAIL'], 'password': os.environ['GARMIN_PASSWORD'], 'email': os.environ['GARMIN_EMAIL']}
          config['Garmin'] = {'username': os.environ['GARMIN_EMAIL'], 'password': os.environ['GARMIN_PASSWORD'], 'email': os.environ['GARMIN_EMAIL']}
          
          with open('karoosync.cfg', 'w') as f:
              config.write(f)
          "

      - name: Run Sync Script
        run: |
          python karoo_garmin_sync.py
