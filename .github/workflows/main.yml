name: Karoo to Garmin Sync

on:
  schedule:
    # Läuft alle 30 Minuten vollautomatisch
    - cron: '*/30 * * * *'
  # Erlaubt das manuelle Starten über den Button "Run workflow"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install garminconnect requests garth PyJWT
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Generate and Fill karoosync.cfg
        env:
          HAMMERHEAD_EMAIL: ${{ secrets.HAMMERHEAD_EMAIL }}
          HAMMERHEAD_PASSWORD: ${{ secrets.HAMMERHEAD_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          # 1. Erster Lauf: Skript generiert die originale karoosync.cfg-Vorlage
          python karoo_garmin_sync.py || true

          # 2. Zugangsdaten in die frisch erzeugte Datei einfügen
          sed -i "s/your_hammerhead_email/$HAMMERHEAD_EMAIL/g" karoosync.cfg || true
          sed -i "s/your_hammerhead_password/$HAMMERHEAD_PASSWORD/g" karoosync.cfg || true
          sed -i "s/your_garmin_email/$GARMIN_EMAIL/g" karoosync.cfg || true
          sed -i "s/your_garmin_password/$GARMIN_PASSWORD/g" karoosync.cfg || true

          # Dynamisches Überschreiben aller Werte mit den Secrets:
          python -c "
          import configparser, os
          config = configparser.ConfigParser()
          config.read('karoosync.cfg')
          for section in config.sections():
              for key in config[section]:
                  if 'garmin' in section.lower():
                      if 'pass' in key.lower(): config[section][key] = os.environ['GARMIN_PASSWORD']
                      else: config[section][key] = os.environ['GARMIN_EMAIL']
                  else:
                      if 'pass' in key.lower(): config[section][key] = os.environ['HAMMERHEAD_PASSWORD']
                      else: config[section][key] = os.environ['HAMMERHEAD_EMAIL']
          with open('karoosync.cfg', 'w') as f:
              config.write(f)
          "

      - name: Run Sync Script
        run: |
          # 3. Zweiter Lauf: Jetzt sind die Daten sicher eingetragen
          python karoo_garmin_sync.py || true
