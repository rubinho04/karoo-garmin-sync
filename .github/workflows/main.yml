name: Karoo to Garmin Sync

on:
  schedule:
    # Läuft alle 30 Minuten vollautomatisch
    - cron: '*/30 * * * *'
  # Erlaubt das manuelle Starten über den Button "Run workflow"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Sync Script
        env:
          HAMMERHEAD_EMAIL: ${{ secrets.HAMMERHEAD_EMAIL }}
          HAMMERHEAD_PASSWORD: ${{ secrets.HAMMERHEAD_PASSWORD }}
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
        run: |
          python sync.py
